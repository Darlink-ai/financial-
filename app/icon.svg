<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="topGloss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="dollarFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dbeafe"/>
    </linearGradient>
    <filter id="emboss" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6" in="SourceAlpha"/>
      <feOffset dx="0" dy="1.8" result="shadow"/>
      <feComponentTransfer in="shadow" result="shadow2">
        <feFuncA type="linear" slope="0.45"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadow2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond bleu en relief -->
  <rect x="2" y="2" width="60" height="60" rx="14" fill="url(#bg)"/>
  <!-- Brillance haute -->
  <rect x="2" y="2" width="60" height="28" rx="14" fill="url(#topGloss)"/>
  <!-- Bord intérieur subtil -->
  <rect x="2.5" y="2.5" width="59" height="59" rx="13.5" fill="none"
        stroke="#1e40af" stroke-opacity="0.35" stroke-width="1"/>

  <!-- Signe dollar avec ombre portée -->
  <g filter="url(#emboss)">
    <text x="32" y="46.5"
          text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif"
          font-weight="900"
          font-size="44"
          fill="url(#dollarFill)">$</text>
  </g>
</svg>
